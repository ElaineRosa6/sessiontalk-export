<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI对话导出助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-title">
        <span class="logo">📥</span>
        <span>AI对话导出助手</span>
      </div>
      <div class="platform-badge" id="platform-badge">检测中...</div>
      <button class="settings-btn" id="settings-btn" title="设置">⚙</button>
    </header>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
      <span class="status-text" id="status-text">正在检测平台...</span>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索对话..." />
      <button class="filter-btn" id="filter-btn" title="筛选">筛选 ▼</button>
    </div>

    <!-- Filter Panel (hidden by default) -->
    <div class="filter-panel" id="filter-panel" hidden>
      <div class="filter-option">
        <label>日期范围:</label>
        <select id="date-filter">
          <option value="all">全部</option>
          <option value="today">今天</option>
          <option value="week">本周</option>
          <option value="month">本月</option>
        </select>
      </div>
    </div>

    <!-- Conversation List -->
    <div class="conversation-list" id="conversation-list">
      <div class="loading-placeholder">
        <span class="loading-text">正在加载对话列表...</span>
      </div>
    </div>

    <!-- Selection Controls -->
    <div class="selection-controls">
      <button class="select-btn" id="select-all-btn">全选</button>
      <button class="select-btn" id="invert-select-btn">反选</button>
      <span class="selected-count" id="selected-count">已选: 0 条</span>
    </div>

    <!-- Export Options -->
    <div class="export-options">
      <div class="format-options">
        <label>导出格式:</label>
        <div class="format-radio-group">
          <label class="radio-label">
            <input type="radio" name="format" value="markdown" checked />
            Markdown
          </label>
          <label class="radio-label">
            <input type="radio" name="format" value="html" />
            HTML
          </label>
        </div>
      </div>
      <div class="merge-option">
        <label class="checkbox-label">
          <input type="checkbox" id="merge-checkbox" />
          合并为一个文件
        </label>
      </div>
    </div>

    <!-- Quick Export -->
    <div class="quick-export">
      <button class="quick-export-btn" id="quick-export-btn">
        📥 导出当前对话
      </button>
    </div>

    <!-- Export Button -->
    <div class="export-action">
      <button class="export-btn primary" id="export-btn" disabled>
        📥 导出选中对话
      </button>
    </div>

    <!-- Progress Modal (hidden by default) -->
    <div class="progress-modal" id="progress-modal" hidden>
      <div class="progress-content">
        <div class="progress-title">正在导出...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">准备中...</div>
        <div class="progress-percent" id="progress-percent">0%</div>
        <button class="cancel-btn" id="cancel-btn">取消</button>
      </div>
    </div>

    <!-- Status Toast -->
    <div class="status-toast" id="status-toast" hidden></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
